name: Runtime ETL Pipeline (Snowflake + Groq Agent)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: "ETL pipeline name (letters, numbers, underscore)"
        required: true
        default: "etl_runtime_demo"
      source_table:
        description: "Source table, e.g. RAW_DB.RAW_SCHEMA.ORDERS_RAW"
        required: true
      target_table:
        description: "Target table, e.g. DWH_DB.MART_SCHEMA.ORDERS_CURATED"
        required: true
      warehouse:
        description: "Snowflake warehouse for ETL task"
        required: true
        default: "COMPUTE_WH"

jobs:
  run-etl:
    runs-on: ubuntu-latest
    env:
      ETL_PIPELINE_NAME: ${{ github.event.inputs.pipeline_name || 'etl_runtime_demo' }}
      ETL_SOURCE_TABLE: ${{ github.event.inputs.source_table || vars.ETL_SOURCE_TABLE }}
      ETL_TARGET_TABLE: ${{ github.event.inputs.target_table || vars.ETL_TARGET_TABLE }}
      ETL_WAREHOUSE_FALLBACK: ${{ github.event.inputs.warehouse || vars.SNOWFLAKE_WAREHOUSE || 'COMPUTE_WH' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-connector-python langchain-groq

      - name: Create and run ETL pipeline in Snowflake
        run: |
          python - <<'PY'
          import os
          import re
          import snowflake.connector
          from langchain_groq import ChatGroq

          pipeline_name = os.environ["ETL_PIPELINE_NAME"]
          source_table = "st_Orders"
          target_table = "tt_orders"
          warehouse = "compute_wh"

          if not source_table or not target_table:
              raise ValueError("Missing ETL_SOURCE_TABLE and/or ETL_TARGET_TABLE. Set GitHub repo variables ETL_SOURCE_TABLE and ETL_TARGET_TABLE (or use workflow_dispatch inputs).")

          if not re.fullmatch(r"[A-Za-z0-9_]+", pipeline_name):
              raise ValueError("pipeline_name must contain only letters, numbers, underscore")

          for obj in [source_table, target_table]:
              if not re.fullmatch(r"[A-Za-z0-9_\\.]+", obj):
                  raise ValueError(f"Invalid object name: {obj}")

          llm = ChatGroq(
              groq_api_key=os.environ["GROQ_API_KEY"],
              model_name="llama-3.1-8b-instant"
          )

          prompt = (
              f"Create a single Snowflake SQL SELECT statement that transforms data from "
              f"{source_table} for loading into {target_table}. Keep it production-safe."
          )
          transform_sql = llm.invoke(prompt).content.strip()

          # Minimal safety fallback in case model output is empty.
          if not transform_sql:
              transform_sql = f"SELECT * FROM {source_table}"

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              schema=os.environ["SNOWFLAKE_SCHEMA"],
          )

          task_name = f"{pipeline_name}_task"

          with conn.cursor() as cur:
              cur.execute(
                  f"CREATE TABLE IF NOT EXISTS {target_table} AS "
                  f"SELECT * FROM {source_table} WHERE 1=0"
              )
              cur.execute(f"CREATE OR REPLACE TASK {task_name} WAREHOUSE = {warehouse} AS INSERT INTO {target_table} {transform_sql}")
              cur.execute(f"EXECUTE TASK {task_name}")

          conn.close()
          print(f"ETL pipeline '{pipeline_name}' created and executed via task '{task_name}'.")
          PY
